<!DOCTYPE html>
<html>

<head>
    <style>
        .subscribe-button {
            background-color: rgb(200, 0, 0);
            color: white;
            border: none;
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 2px;
            cursor: pointer;
            transition: box-shadow 3s ease;
            margin-right: 6px;
            vertical-align: top;
            transition: opacity 0.2s;
        }

        /* This works when i hover over the button*/
        .subscribe-button:hover {
            opacity: 0.6;
        }

        /*This works when i click the button*/
        .subscribe-button:active {
            opacity: 0.5;
        }

        .join-button {
            color: rgb(19, 102, 203);
            border-color: rgb(19, 102, 203);
            background-color: white;
            border-radius: 2px;
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 9px;
            padding-bottom: 9px;
            border-style: solid;
            border-width: 1px;
            cursor: pointer;
            margin-right: 6px;
            vertical-align: top;
            transition: background-color 0.2s,
                color 0.2s;
        }

        .join-button:hover {
            color: white;
            background-color: rgb(19, 102, 203);
        }

        .join-button:active {
            opacity: 0.7;
        }

        .tweet-button {
            background-color: rgb(45, 149, 201);
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 6px;
            padding-bottom: 6px;
            border-radius: 17.5px;
            border-color: rgb(45, 149, 201);
            border-style: solid;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin-right: 6px;
            font-size: 15px;
            vertical-align: top;
            transition: box-shadow 0.2s;
        }

        .tweet-button:hover {
            box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.15);
        }

        .join-my-channel-button {
            color: rgb(19, 102, 203);
            border-color: rgb(19, 102, 203);
            background-color: white;
            border-radius: 2px;
            border-style: solid;
            border-width: 1px;
            cursor: pointer;
            margin-right: 6px;
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 9px;
            padding-bottom: 9px;
            vertical-align: top;
            transition: background-color 0.2s,
                color 0.2s;
        }

        .join-my-channel-button:hover {
            color: white;
            background-color: rgb(19, 102, 203);
        }

        .join-my-channel-button:active {
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <button class="subscribe-button">SUBSCRIBE</button>
    <button class="join-button">JOIN</button>
    <button class="tweet-button">Tweet</button>
    <button class="join-my-channel-button">JOIN MY CHANNEL</button>
</body>

</html>
