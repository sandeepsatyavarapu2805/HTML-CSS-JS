<!DOCTYPE html>
<html>

<head>
    <style>
        .num {
            color: purple;
            padding-top: 5px;
            padding-bottom: 5px;
            display: inline-block;
            width: 20px;
            text-align: center;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .back,
        .next {
            cursor: pointer;
            padding: 10px 20px;
            font-size: 16px;
        }

        .stretch {
            background-color: rgb(7, 179, 7);
            padding: 10px 20px;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px;
            transition: padding 0.5s;
        }

        .stretch:hover {
            padding: 30px 40px;
        }

        .shadow {
            background-color: rgb(7, 179, 7);
            padding: 10px 20px;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px;
            box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.3);
            margin-right: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .shadow:active {
            transform: translate(5px, 5px);
            box-shadow: 0px 0px 0px rgba(0, 0, 0, 0);
        }

        .num-buttons {
            background-color: rgb(7, 179, 7);
            padding: 10px 20px;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px 30px;
            transition: padding 0.2s,
                margin 0.2s;
        }

        .num-buttons:hover {
            padding: 10px 40px;
            margin: 8px 10px;
        }
    </style>
</head>

<body>
    <button class="back">Back</button>

    <a href="#" class="num">1</a>
    <a href="#" class="num">2</a>
    <a href="#" class="num">3</a>
    <a href="#" class="num">4</a>
    <a href="#" class="num">5</a>

    <button class="next">Next</button>
    <button class="stretch">Stretch</button>
    <button class="shadow">Shadow</button>

    <button class="num-buttons">One</button>
    <button class="num-buttons">Two</button>
    <button class="num-buttons">Three</button>
</body>

</html>
