<!DOCTYPE html>
<html>

<head>
    <style>
        .amazon-link {
            color: rgb(0, 113, 133);
            transition: color 0.2s;
        }

        .amazon-link:hover {
            color: rgb(236, 139, 34);
        }

        .product-text {
            color: black;
            font-weight: bold;
            font-size: 24px;
        }

        .price-text {
            color: rgb(0, 118, 0);
            font-weight: bold;
        }

        .add-to-cart-button {
            background-color: rgb(255, 216, 20);
            height: 32px;
            width: 115px;
            border-radius: 16px;
            border-style: solid;
            cursor: pointer;
            border-color: rgb(255, 216, 20);
            margin-right: 10px;
            transition: background-color 0.2s,
                border-color 0.2s;
        }

        .add-to-cart-button:hover {
            background-color: rgb(219, 187, 24);
            border-color: rgb(219, 187, 24);
        }

        .add-to-cart-button:active {
            opacity: 0.7;
        }

        .buy-now-button {
            background-color: rgb(255, 164, 28);
            border-color: rgb(255, 164, 28);
            border-style: solid;
            height: 32px;
            border-radius: 16px;
            width: 115px;
            cursor: pointer;
            transition: background-color 0.2s,
                border-color 0.2s;
        }

        .buy-now-button:active {
            opacity: 0.7;
        }

        .buy-now-button:hover {
            background-color: rgb(217, 126, 29);
            border-color: rgb(217, 126, 29);
        }
    </style>
</head>

<body>
    <a href="https://www.amazon.in/" target="_blank" class="amazon-link">Back to Amazon</a>

    <p class="product-text">Nike Black Running Shoes</p>
    <p class="price-text">$39 - in stock.</p>
    <p>Free Delivery tomorrow</p>

    <button class="add-to-cart-button">Add to Cart</button>
    <button class="buy-now-button">Buy now</button>
</body>

</html>
