<!DOCTYPE html>
<html>

<head>
    <style>
        .request-button {
            background-color: black;
            color: white;
            border-radius: 2px;
            cursor: pointer;
            border-style: solid;
            height: 36px;
            width: 120px;
            margin-right: 5px;
            transition: opacity 0.2s;
        }

        .request-button:hover {
            opacity: 0.8;
        }

        .add-to-cart {
            background-color: rgb(255, 216, 20);
            width: 170px;
            height: 36px;
            border-radius: 18px;
            border-color: rgb(255, 216, 20);
            border-style: solid;
            cursor: pointer;
            margin-right: 5px;
            transition: background-color 0.2s,
                border-color 0.2s;
        }

        .add-to-cart:hover {
            border-color: rgb(220, 187, 21);
            background-color: rgb(220, 187, 21);
        }

        .sign-up {
            color: white;
            background-color: rgb(46, 164, 79);
            border-color: rgb(46, 164, 79);
            border-style: solid;
            border-radius: 4px;
            height: 36px;
            width: 80px;
            font-weight: bold;
            margin-right: 5px;
            cursor: pointer;
        }

        .sign-up:hover {
            box-shadow: 0px 5px 5px rgba(0, 0, 0, 0.15);
        }

        .get-started-button {
            background-color: rgb(121, 82, 179);
            border-color: rgb(121, 82, 179);
            color: white;
            border-style: solid;
            height: 36px;
            width: 110px;
            font-weight: bold;
            border-radius: 3px;
            margin-right: 5px;
            cursor: pointer;
            transition: background-color 0.2s,
                border-color 0.2s;
        }

        .get-started-button:hover {
            background-color: rgb(98, 56, 161);
            border-color: rgb(98, 56, 161);
        }

        .download-button {
            background-color: white;
            border-color: rgb(108, 117, 125);
            color: rgb(108, 117, 125);
            border-style: solid;
            height: 36px;
            border-radius: 3px;
            width: 105px;
            font-weight: bold;
            margin-right: 5px;
            cursor: pointer;
            border-width: 0.5px;
            transition: background-color 0.2s,
                color 0.2s;
        }

        .download-button:hover {
            background-color: rgb(108, 117, 125);
            color: white;
        }

        .apply-button {
            background-color: rgb(10, 102, 194);
            color: white;
            margin-top: 10px;
            height: 36px;
            width: 215px;
            border-radius: 18px;
            border-style: solid;
            border-color: rgb(10, 102, 194);
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s,
                border-color 0.2s;
        }

        .apply-button:hover {
            background-color: rgb(7, 63, 119);
            border-color: rgb(7, 63, 119);
        }

        .save-button {
            background-color: white;
            border-color: rgb(10, 102, 194);
            color: rgb(10, 102, 194);
            border-style: solid;
            cursor: pointer;
            height: 36px;
            width: 80px;
            font-weight: bold;
            border-radius: 18px;
            border-width: 0.5px;
            margin-left: 5px;
            transition: background-color 0.2s,
                border-width 0.01s;
        }

        .save-button:hover {
            background-color: rgb(204, 225, 250);
            border-width: 2px;
        }
    </style>
</head>

<body>
    <button class="request-button">Request Now</button>
    <button class="add-to-cart">Add to Cart</button>
    <button class="sign-up">Sign up</button>
    <button class="get-started-button">Get started</button>
    <button class="download-button">Download</button>
    <button class="apply-button">Apply on company website</button>
    <button class="save-button">Save</button>
</body>

</html>
